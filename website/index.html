<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d9488" />

    <title>DocSourced — Capture, Organize &amp; Format Research in Google Docs</title>
    <meta name="description" content="Turn messy web research into structured, source-backed Google Docs. Capture text and image snippets from any page, insert them with one click, and get clean source links—plus optional Pro reference formatting. One Chrome extension, less friction." />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="DocSourced — Capture, Organize &amp; Format Research in Google Docs" />
    <meta property="og:description" content="Turn messy web research into structured, source-backed Google Docs. Capture snippets from any page, insert with one click, get clean source links and optional Pro reference formatting." />
    <meta property="og:image" content="/DocSourced-logo.png" />
    <meta property="og:image:alt" content="DocSourced logo" />
    <!-- Replace og:image with full URL in production, e.g. https://yoursite.com/DocSourced-logo.png -->

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="DocSourced — Capture, Organize &amp; Format Research in Google Docs" />
    <meta name="twitter:description" content="Turn messy web research into structured, source-backed Google Docs. Capture snippets, insert with one click, get clean source links." />
    <meta name="twitter:image" content="/DocSourced-logo.png" />

    <!-- Canonical URL: set to your production URL when deploying -->
    <!-- <link rel="canonical" href="https://docsourced.com/" /> -->

    <!-- Favicon (logo from /website) -->
    <link rel="icon" type="image/png" href="/DocSourced-logo.png" />
    <link rel="apple-touch-icon" href="/DocSourced-logo.png" />

    <!-- Fonts: preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
