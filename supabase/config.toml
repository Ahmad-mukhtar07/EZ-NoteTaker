# Supabase CLI config. See: https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]

[db]
port = 54322
shadow_port = 54320

[studio]
enabled = true
port = 54323

# Per-function JWT verification. Both functions validate in code (create-checkout-session: getUser(); stripe-webhook: Stripe signature).
[functions.create-checkout-session]
verify_jwt = false

[functions.create-billing-portal-session]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false
